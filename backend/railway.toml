# ══════════════════════════════════════════
# SmartTask Pro — Backend (Railway Config)
# ══════════════════════════════════════════

[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
