databases:
  - name: smarttask-db
    plan: free
    databaseName: smarttask
    user: smarttask_user

services:
  # Backend FastAPI
  - type: web
    name: smarttask-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smarttask-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 1440
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: PYTHON_VERSION
        value: 3.11.9

  # Frontend React/Vite
  - type: web
    name: smarttask-app
    runtime: static
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://smarttask-api.onrender.com/api
